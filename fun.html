<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>SECRET</title>
    <link rel="stylesheet" href="fun.css" />
</head>
<body>
<a id="back-btn" class="back-button">

    <!-- 小さくしたスイング風アイコン -->
    <svg id="swing-icon" viewBox="0 0 100 100" class="swing-icon">
        <circle cx="50" cy="50" r="43"
            stroke="url(#gradOuter)" stroke-width="10" fill="none" />
        <polyline 
            points="60,22 28,50 60,78"
            fill="none"
            stroke="white"
            stroke-width="14"
            stroke-linecap="round"
            stroke-linejoin="round"
        />
        <defs>
            <linearGradient id="gradOuter" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#1c4fd9"/>
                <stop offset="100%" stop-color="#5aa4ff"/>
            </linearGradient>
        </defs>
    </svg>
    <!-- 中央表示 PERFECT -->
    <div id="perfect-text" class="perfect-text">PERFECT</div>
</a>

<div class="center-wrapper full">
    <div class="hourglass-container">
        <img src="sandclock.png" class="hourglass-frame" />

        <div class="sand-top">
            <img src="sandclock2.png" />
            <div class="mask-top"></div>
        </div>

        <div class="sand-bottom">
            <img src="sandclock2.png" />
            <div class="mask-bottom"></div>
        </div>
    </div>
    <div class="timer-box">
    <div id="countup-timer" class="digital-timer">00:000:00:00:00</div>
    </div>
</div>
<script src="fun.js"></script>
</body>
</html>
